  <!-- LIGHTBOX -->
  <div id="lightbox-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);align-items:center;justify-content:center;cursor:zoom-out;" onclick="if(event.target===this)closeLightbox()">
    <button onclick="closeLightbox()" style="position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:2.2rem;cursor:pointer;z-index:10001;line-height:1;padding:8px;" aria-label="Close">&times;</button>
    <button id="lb-prev" onclick="lbNav(-1);event.stopPropagation()" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;z-index:10001;padding:12px;opacity:0.7;" aria-label="Previous">&#8249;</button>
    <button id="lb-next" onclick="lbNav(1);event.stopPropagation()" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:2.5rem;cursor:pointer;z-index:10001;padding:12px;opacity:0.7;" aria-label="Next">&#8250;</button>
    <img id="lb-img" src="" alt="" style="max-width:92vw;max-height:92vh;object-fit:contain;user-select:none;-webkit-user-drag:none;transition:opacity 0.2s;" onclick="event.stopPropagation()">
  </div>
  <script>
  (function(){
    var lbOverlay=document.getElementById('lightbox-overlay'),lbImg=document.getElementById('lb-img'),lbImages=[],lbIdx=0,touchX=0;
    function collectImages(){
      lbImages=[];
      document.querySelectorAll('.gallery-item img, .masonry-item img').forEach(function(img,i){
        lbImages.push(img.src);
        img.style.cursor='zoom-in';
        img.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();openLightbox(i);});
      });
    }
    function openLightbox(i){lbIdx=i;lbImg.src=lbImages[lbIdx];lbOverlay.style.display='flex';document.body.style.overflow='hidden';}
    function closeLB(){lbOverlay.style.display='none';document.body.style.overflow='';}
    function nav(d){lbIdx=(lbIdx+d+lbImages.length)%lbImages.length;lbImg.src=lbImages[lbIdx];}
    window.closeLightbox=closeLB;window.lbNav=nav;window.openLightbox=openLightbox;
    document.addEventListener('keydown',function(e){if(lbOverlay.style.display==='flex'){if(e.key==='Escape')closeLB();else if(e.key==='ArrowLeft')nav(-1);else if(e.key==='ArrowRight')nav(1);}});
    lbOverlay.addEventListener('touchstart',function(e){touchX=e.changedTouches[0].screenX;},{passive:true});
    lbOverlay.addEventListener('touchend',function(e){var dx=e.changedTouches[0].screenX-touchX;if(Math.abs(dx)>50){dx>0?nav(-1):nav(1);}},{passive:true});
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',collectImages);}else{collectImages();}
  })();
  </script>
  
  <script>
    const LANG = { default: 'en', current: document.documentElement.lang || 'en' };
    function toggleLang() {
      LANG.current = LANG.current === 'es' ? 'en' : 'es';
      document.documentElement.lang = LANG.current;
      document.querySelectorAll('[data-es][data-en]').forEach(el => {
        el.textContent = el.getAttribute('data-' + LANG.current) || el.textContent;
      });
      document.querySelectorAll('[data-es-href][data-en-href]').forEach(el => {
        el.setAttribute('href', el.getAttribute('data-' + LANG.current + '-href') || el.getAttribute('href'));
      });
      const btn = document.querySelector('.lang-toggle');
      if (btn) btn.textContent = LANG.current === 'es' ? 'EN' : 'ES';
    }
    // Apply language on page load based on html lang attribute
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('[data-es][data-en]').forEach(el => {
        el.textContent = el.getAttribute('data-' + LANG.current) || el.textContent;
      });
      const btn = document.querySelector('.lang-toggle');
      if (btn) btn.textContent = LANG.current === 'es' ? 'EN' : 'ES';
    });

    // Fade-up on scroll
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
  </script>
